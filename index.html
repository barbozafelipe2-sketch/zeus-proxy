<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus Family Hub</title>

<style>
body {
  margin:0;
  font-family: 'DM Sans', sans-serif;
  background:#080B14;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg {
  margin-bottom:12px;
}

.user { color:#4da6ff; }
.ai { color:#00ffcc; }

#controls {
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #222;
}

button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

.active { background:#00aa88; }

#avatar {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:22px;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="controls">
  <button onclick="toggleVoiceMode()" id="voiceBtn">VOICE</button>
  <button onclick="toggleAvatar()">AVATAR</button>
  <button onclick="toggleMic()" id="micBtn">MIC</button>
  <button onclick="toggleMute()" id="muteBtn">MUTE</button>
</div>

<div id="avatar">ZEUS ACTIVE</div>

<script>
let voiceMode = true;
let avatarMode = false;
let muted = false;
let recognition;
let listening = false;

const chat = document.getElementById('chat');

function addMsg(text, cls){
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function detectLang(text){
  if(/[ãõç]/i.test(text)) return 'pt-BR';
  if(/[¿¡]/.test(text)) return 'es-ES';
  return 'en-US';
}

function speak(text, lang){
  if(!voiceMode || muted) return;

  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;

  const voices = speechSynthesis.getVoices();
  const ptVoice = voices.find(v => v.lang === 'pt-BR');

  if(lang === 'pt-BR' && ptVoice){
    utter.voice = ptVoice;
  }

  speechSynthesis.speak(utter);
}

function aiReply(text){
  const lang = detectLang(text);
  let reply = '';

  if(lang === 'pt-BR') reply = "Claro, estou ouvindo você.";
  if(lang === 'es-ES') reply = "Claro, te escucho.";
  if(lang === 'en-US') reply = "Got it, I'm listening.";

  addMsg(reply, 'ai');

  if(voiceMode || avatarMode){
    speak(reply, lang);
  }
}

function toggleVoiceMode(){
  voiceMode = !voiceMode;
  document.getElementById('voiceBtn').classList.toggle('active', voiceMode);
}

function toggleAvatar(){
  avatarMode = !avatarMode;
  document.getElementById('avatar').style.display = avatarMode ? 'flex' : 'none';
}

function toggleMute(){
  muted = !muted;
  document.getElementById('muteBtn').classList.toggle('active', muted);
}

function initMic(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();

  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onresult = (e)=>{
    const text = e.results[e.results.length-1][0].transcript.toLowerCase();
    addMsg(text, 'user');

    if(text.includes("hey zeus") || text.includes("zeus wake up")){
      avatarMode = true;
      document.getElementById('avatar').style.display = 'flex';
      speak("I'm here", "en-US");
      return;
    }

    aiReply(text);
  };

  recognition.onend = ()=>{
    if(listening) recognition.start();
  };
}

function toggleMic(){
  if(!recognition) initMic();

  listening = !listening;

  if(listening){
    recognition.start();
    document.getElementById('micBtn').classList.add('active');
  } else {
    recognition.stop();
    document.getElementById('micBtn').classList.remove('active');
  }
}
</script>

</body>
</html>
